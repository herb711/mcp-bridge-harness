# Example Codex MCP config generated by MCP Harness.
# Codex reads this from ~/.codex/config.toml by default.

[mcp_servers.cc-mcp]
command = "node"
args = ["/absolute/path/to/mcp-harness/dist/index.js", "mcp", "cc-mcp", "--profile", "default"]
enabled = true
startup_timeout_sec = 1800
tool_timeout_sec = 1800

[mcp_servers.cc-mcp.env]
MCP_HARNESS_HOME = "/absolute/path/to/McpHarness"
